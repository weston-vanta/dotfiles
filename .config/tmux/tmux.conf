# tmux quality of life
set -g mouse on
set -g default-terminal 'tmux-256color'
set -sg terminal-overrides ',*:RGB'

# Catppuccin Theme Configuration
# Set the flavor to 'frappe' (options: latte, frappe, macchiato, mocha)
set -g @catppuccin_flavor 'frappe'

# Load the Catppuccin theme plugin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Configure status line
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_current_text ' #{window_name}'
set -g @catppuccin_window_status 'no'
set -g status-left ''
set -g status-right-length 100
set -g status-right '#{E:@catppuccin_status_application}'

set -g @catppuccin_date_time_text ' %d.%m %H:%M'
set -ag status-right '#{E:@catppuccin_status_date_time}'

# Per-pane status
set -g pane-border-status top
set -g pane-border-format ' #P #{?@codespace_name,#[fg=#{@thm_lavender}]#{@codespace_name} ,local }#[default]'
set -g pane-border-style 'fg=#{@thm_surface_2}'
set -g pane-active-border-style 'fg=#{@thm_blue},bold'


# Remap tmux command prefix
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Split panes using | and -
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
unbind '"'
unbind %

# Fast pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Fast reloading of tmux.conf
bind R source-file ~/.config/tmux/tmux.conf
